<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
        crossorigin="anonymous">

    <style>
        #search-input{
            border-color:rgb(0, 105, 217);
        }
        .search-container {
            width: 60%;
            margin: 30px auto;
            text-align: center;
        }
        .results-container {
            width: 60%;
            margin: 20px auto;
        }
        .result-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>

    <script>
        $(document).ready(function() {
            $("#search-form").submit(function(event) {
                event.preventDefault();  // Prevent form from reloading the page
                
                let query = $("#search-input").val();

                $.ajax({
                    url: "/results/" + encodeURIComponent(query),
                    type: "GET",
                    success: function(data) {
                        $("#results").html(data);
                    }
                });
            });
        });
    </script>
</head>

<body>

    <div class="search-container">
        <h1 style="font-family:Arial, Helvetica, sans-serif;">SEARCH <span style="color: rgb(255, 47, 47);">UP</span></h1>
        <form id="search-form">
            <div class="input-group">
                <input type="text" id="search-input" name="query" placeholder="Search..." required class="form-control">
                <div class="input-group-append">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </div>
        </form>
    </div>
    <hr style="height:2px;border-width:0;color:gray;background-color:rgb(0, 105, 217)">


    <div class="results-container" id="results" style="text-align: left;">
        <!-- Search results will be dynamically inserted here -->
    </div>

</body>
</html>
